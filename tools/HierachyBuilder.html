<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecretEngine - 3D Fly-Mode Editor</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; overflow: hidden; }
        #sidebar { width: 350px; display: flex; flex-direction: column; border-right: 1px solid #333; background: #1a1a1a; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .panel-header { padding: 12px; background: #222; border-bottom: 1px solid #333; font-weight: bold; color: #0cf; display: flex; justify-content: space-between; align-items: center; }
        #hierarchy { flex: 1; overflow-y: auto; padding: 10px; }
        .entity-item { padding: 8px 12px; margin-bottom: 4px; background: #252525; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; }
        .entity-item:hover { background: #333; }
        .entity-item.selected { border-color: #0cf; background: #2a353a; }
        .entity-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-btn { color: #ff4444; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        #json-container { height: 250px; padding: 10px; border-top: 1px solid #333; background: #151515; }
        #json-input { width: 100%; height: 180px; background: #0a0a0a; color: #00ff41; border: 1px solid #444; padding: 8px; font-family: 'Consolas', monospace; font-size: 10px; border-radius: 4px; resize: none; box-sizing: border-box; }
        #viewport { flex: 1; position: relative; }
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; color: #0cf; font-family: 'Consolas', monospace; font-size: 12px; text-shadow: 2px 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.6; }
        button.primary { background: #0cf; color: #000; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel-header">HIERARCHY <button class="primary" id="add-sphere-btn">+ Sphere</button></div>
    <div id="hierarchy"></div>
    <div id="json-container">
        <div style="font-size: 11px; margin-bottom: 5px; color: #888;">SCENE JSON</div>
        <textarea id="json-input"></textarea>
        <button id="sync-btn" style="margin-top:5px; width:100%; padding: 8px; background: #333; color: white; border: 1px solid #555; cursor: pointer;">Update Scene</button>
    </div>
</div>

<div id="viewport">
    <div id="hud">
        MODE: <span id="ui-mode">WALKING</span><br>
        FOCUS: <span id="ui-focus">NONE</span><br><br>
        [W,A,S,D] 3D FLY MOVE<br>
        [F] SELECT | [E] PILOT
    </div>
    <div id="crosshair"></div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, fpsControls, transformControl, playerMesh;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let entitiesMap = new Map(); 
    let selectedEntity = null;
    let isPiloting = false;
    const clock = new THREE.Clock();

    // DOM References
    let jsonInput, hierarchyEl;

    const initialJSON = {
        "entities": [
            { "name": "Cube1", "transform": { "position": [-10, 0, 0], "rotation": [0,0,0], "scale": [1,1,1] }, "mesh": { "path": "meshes/cube.meshbin", "color": [1, 0.4, 0.4, 1] }},
            { "name": "Character", "transform": { "position": [0, 0.5, 0], "rotation": [0,0,0], "scale": [1, 1, 1] }, "mesh": { "path": "meshes/Character.meshbin", "color": [0, 1, 1, 1] }, "isPlayer": true },
            { "name": "PlayerStart", "transform": { "position": [0, 2, 15], "rotation": [-10, 0, 0], "scale": [1, 1, 1] }, "isPlayerStart": true }
        ]
    };

    init();
    animate();

    function init() {
        // Initialize DOM refs
        jsonInput = document.getElementById('json-input');
        hierarchyEl = document.getElementById('hierarchy');

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
        
        scene.add(new THREE.GridHelper(100, 50, 0x333333, 0x222222));
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        fpsControls = new PointerLockControls(camera, renderer.domElement);
        transformControl = new TransformControls(camera, renderer.domElement);
        transformControl.addEventListener('dragging-changed', (e) => { if (!e.value) updateJSONFromScene(); });
        scene.add(transformControl);

        document.getElementById('viewport').addEventListener('click', () => { if (!transformControl.dragging) fpsControls.lock(); });
        document.getElementById('sync-btn').addEventListener('click', loadFromJSON);
        document.getElementById('add-sphere-btn').addEventListener('click', addSphere);

        setupKeyboard();
        jsonInput.value = JSON.stringify(initialJSON, null, 4);
        loadFromJSON();
    }

    function spawnEntity(ent) {
        let mesh;
        if (ent.isPlayerStart) {
            mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.5), new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true }));
        } else {
            const geo = ent.name.includes('Sphere') ? new THREE.SphereGeometry(0.5) : new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: ent.mesh?.color ? new THREE.Color(...ent.mesh.color) : 0xcccccc });
            mesh = new THREE.Mesh(geo, mat);
        }
        mesh.position.set(...ent.transform.position);
        mesh.rotation.set(...ent.transform.rotation.map(r => r * Math.PI / 180));
        mesh.scale.set(...ent.transform.scale);
        scene.add(mesh);
        entitiesMap.set(mesh, ent);
        return mesh;
    }

    function loadFromJSON() {
        entitiesMap.forEach((v, k) => { scene.remove(k); k.geometry?.dispose(); k.material?.dispose(); });
        entitiesMap.clear();
        transformControl.detach();
        
        try {
            const data = JSON.parse(jsonInput.value);
            data.entities.forEach(ent => {
                const mesh = spawnEntity(ent);
                if (ent.isPlayer) playerMesh = mesh;
                if (ent.isPlayerStart) { camera.position.set(...ent.transform.position); }
            });
            refreshHierarchyUI();
        } catch(e) { console.error("Invalid JSON", e); }
    }

    function setupKeyboard() {
        window.addEventListener('keydown', (e) => {
            if (document.activeElement === jsonInput) return;
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'KeyF': handleSelection(); break;
                case 'KeyE': 
                    if (selectedEntity) { 
                        isPiloting = !isPiloting; 
                        document.getElementById('ui-mode').innerText = isPiloting ? "PILOTING" : "WALKING"; 
                    } 
                    break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });
    }

    function handleSelection() {
        if (!playerMesh || isPiloting) return;
        let closest = null, minDist = 5.0;
        entitiesMap.forEach((data, mesh) => {
            if (data.isPlayer || data.isPlayerStart) return;
            const dist = playerMesh.position.distanceTo(mesh.position);
            if (dist < minDist) { minDist = dist; closest = mesh; }
        });
        if (selectedEntity && selectedEntity.material.emissive) selectedEntity.material.emissive.set(0x000000);
        selectedEntity = closest;
        if (selectedEntity) { 
            selectedEntity.material.emissive.set(0x003333); 
            document.getElementById('ui-focus').innerText = entitiesMap.get(selectedEntity).name; 
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const moveSpeed = 10.0 * delta;

        if (fpsControls.isLocked) {
            const moveTarget = isPiloting ? selectedEntity : playerMesh;
            if (moveTarget) {
                // Get 3D direction vectors from camera
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward); // This includes the Y pitch
                forward.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(forward, camera.up).normalize();

                if (moveForward) moveTarget.position.addScaledVector(forward, moveSpeed);
                if (moveBackward) moveTarget.position.addScaledVector(forward, -moveSpeed);
                if (moveLeft) moveTarget.position.addScaledVector(right, -moveSpeed);
                if (moveRight) moveTarget.position.addScaledVector(right, moveSpeed);

                // Make target face movement direction
                moveTarget.rotation.set(camera.rotation.x, camera.rotation.y, camera.rotation.z);
            }

            if (isPiloting && selectedEntity) {
                const targetPos = selectedEntity.position.clone();
                const offset = new THREE.Vector3(0, 5, 10).applyQuaternion(selectedEntity.quaternion);
                camera.position.lerp(targetPos.add(offset), 0.1);
                camera.lookAt(selectedEntity.position);
            } else if (playerMesh) {
                camera.position.copy(playerMesh.position).add(new THREE.Vector3(0, 1.6, 0));
            }
            updateJSONFromScene();
        }
        renderer.render(scene, camera);
    }

    function refreshHierarchyUI() {
        if (!hierarchyEl) return;
        hierarchyEl.innerHTML = '';
        entitiesMap.forEach((data, mesh) => {
            const div = document.createElement('div');
            div.className = 'entity-item' + (transformControl.object === mesh ? ' selected' : '');
            div.innerHTML = `<span class="entity-name">${data.name}</span><button class="del-btn">&times;</button>`;
            div.onclick = (e) => {
                if(e.target.className === 'del-btn') { 
                    scene.remove(mesh); entitiesMap.delete(mesh); updateJSONFromScene(); refreshHierarchyUI(); 
                } else { 
                    transformControl.attach(mesh); refreshHierarchyUI(); 
                }
            };
            hierarchyEl.appendChild(div);
        });
    }

    function updateJSONFromScene() {
        const entities = [];
        entitiesMap.forEach((data, mesh) => {
            data.transform.position = [parseFloat(mesh.position.x.toFixed(2)), parseFloat(mesh.position.y.toFixed(2)), parseFloat(mesh.position.z.toFixed(2))];
            data.transform.rotation = [parseFloat((mesh.rotation.x * 180/Math.PI).toFixed(2)), parseFloat((mesh.rotation.y * 180/Math.PI).toFixed(2)), parseFloat((mesh.rotation.z * 180/Math.PI).toFixed(2))];
            entities.push(data);
        });
        jsonInput.value = JSON.stringify({ entities }, null, 4);
    }

    function addSphere() {
        const newEnt = { "name": "NewSphere", "transform": { "position": [camera.position.x, 0, camera.position.z - 5], "rotation": [0,0,0], "scale": [1,1,1] }, "mesh": { "path": "meshes/sphere.meshbin", "color": [0.5, 0.5, 1, 1] } };
        const mesh = spawnEntity(newEnt); 
        transformControl.attach(mesh); 
        updateJSONFromScene(); 
        refreshHierarchyUI();
    }

    window.onresize = () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    };
</script>
</body>
</html>
